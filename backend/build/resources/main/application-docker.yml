spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/erp_db}
    username: ${DB_USERNAME:erp_user}
    password: ${DB_PASSWORD:erp_pass}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

app:
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: http://localhost,http://frontend
  minio:
    url: ${MINIO_URL:http://minio:9000}
